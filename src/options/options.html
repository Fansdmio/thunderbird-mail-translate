<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Mail Translate Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <h1 data-i18n="optionsHeading">Mail Translate Settings</h1>

  <section>
    <h2 data-i18n="optionsGeneral">General</h2>
    <label>
      <span data-i18n="optionsEngine">Translation engine</span>
      <select id="engine">
        <option value="microsoft-free" data-i18n="optionsEngineMicrosoftFree">Microsoft Translator (default, no setup)</option>
        <option value="microsoft-azure" data-i18n="optionsEngineAzure">Microsoft Azure (API key required)</option>
        <option value="openai" data-i18n="optionsEngineOpenai">Custom AI (OpenAI-compatible)</option>
      </select>
    </label>
    <label>
      <span data-i18n="optionsTargetLang">Target language</span>
      <select id="targetLang"></select>
    </label>
  </section>

  <section id="azureSection" hidden>
    <h2 data-i18n="optionsAzure">Microsoft Azure</h2>
    <label>
      <span data-i18n="optionsAzureKey">Subscription key</span>
      <input id="azureKey" type="password" autocomplete="off" />
    </label>
    <label>
      <span data-i18n="optionsAzureRegion">Region</span>
      <input id="azureRegion" data-i18n-placeholder="optionsAzureRegionPlaceholder" placeholder="eastasia" />
    </label>
  </section>

  <section id="openaiSection" hidden>
    <h2 data-i18n="optionsOpenai">Custom AI</h2>
    <label>
      <span data-i18n="optionsOpenaiBaseUrl">Base URL</span>
      <input id="openaiBaseUrl" data-i18n-placeholder="optionsOpenaiBaseUrlPlaceholder" placeholder="https://api.openai.com/v1" />
    </label>
    <label>
      <span data-i18n="optionsOpenaiKey">API Key</span>
      <input id="openaiApiKey" type="password" autocomplete="off" />
    </label>
    <label>
      <span data-i18n="optionsOpenaiModel">Model ID</span>
      <input id="openaiModel" data-i18n-placeholder="optionsOpenaiModelPlaceholder" placeholder="gpt-4o-mini" />
    </label>
    <p class="hint" data-i18n="optionsHostPermissionNote">
      Custom AI requires host access to your Base URL origin.
    </p>
  </section>

  <div class="actions">
    <button id="save" type="button" data-i18n="optionsSave">Save</button>
    <button id="test" type="button" data-i18n="optionsTest">Test connection</button>
    <span id="status"></span>
  </div>

  <p class="hint" data-i18n="optionsHint">
    Default Microsoft Translator needs no key. Message content is sent only to the engine you choose.
  </p>
  <p class="hint">
    <a id="privacyLink" href="../../privacy.html" target="_blank" rel="noopener" data-i18n="optionsPrivacy">Privacy policy</a>
  </p>

  <script src="../shared/languages.js"></script>
  <script src="../shared/settings.js"></script>
  <script src="../shared/host-permissions.js"></script>
  <script src="options.js"></script>
</body>
</html>
